paths:
  kaggle_brahmi: "data/kaggle_brahmi"
  raw_estampages: "data/raw_estampages"
  processed: "data/processed"
  synthetic: "data/synthetic"
  models: "models"
  outputs: "outputs"

model:
  name: "mobilenet_v2"
  num_classes: 368          # 33 consonants + 10 vowels + 325 compounds
  image_size: 224
  confidence_threshold: 0.40

training:
  batch_size: 32           # Increase this if your GPU can handle it (e.g., 32 or 64) for faster, smoother training
  epochs: 25               # Give it enough time to master the dataset
  learning_rate: 0.001
  curriculum_start_epoch: 8 # Introduce the heavy rock damage at epoch 8